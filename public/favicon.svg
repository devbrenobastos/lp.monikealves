<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Olive background matching the style guide -->
  <rect width="100" height="100" rx="22" fill="#6A8E38" />
  
  <!-- White mathematical asterisk in the center matching the hero seal -->
  <g stroke="#FFFFFF" stroke-width="8" stroke-linecap="round">
    <line x1="50" y1="20" x2="50" y2="80" />
    <line x1="20" y1="50" x2="80" y2="50" />
    <line x1="29" y1="29" x2="71" y2="71" />
    <line x1="29" y1="71" x2="71" y2="29" />
  </g>
</svg>